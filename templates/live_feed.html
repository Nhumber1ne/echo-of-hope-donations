<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Live Donations — Echo of Hope Outreach Ghana</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a8f5f, #1a73e8);
  color: white;
  text-align: center;
  padding: 20px;
}

h1 {
  margin-bottom: 10px;
}

.feed {
  max-width: 600px;
  margin: auto;
  margin-top: 30px;
}

.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<h1>❤️ Live Donations</h1>
<p>See how lives are being changed in real-time</p>

<div class="feed" id="feed"></div>

<script>
async function loadFeed() {
  const res = await fetch("/api/public-donations");
  const data = await res.json();

  const container = document.getElementById("feed");
  container.innerHTML = "";

  data.donations.forEach(d => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <strong>${d.name}</strong> donated 
      <strong>GHS ${parseFloat(d.amount).toFixed(2)}</strong>
      <br>
      <small>${d.datetime}</small>
    `;

    container.appendChild(div);
  });
}

setInterval(loadFeed, 4000);
loadFeed();
</script>

</body>
</html>
